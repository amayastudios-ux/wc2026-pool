name: Update World Cup Results

on:
  schedule:
    - cron: '0 */3 * * *'  # every 3 hours (results appear ~3h after each match)
  workflow_dispatch:         # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch & update results
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python update_results.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes — skipping push (saves Netlify build minutes)"
          else
            git commit -m "chore: update WC results $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
